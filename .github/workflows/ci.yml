name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install python-docx requests

      - name: Engine self-tests
        run: bash tests/run_tests.sh

      - name: Portability check
        run: bash scripts/portability_check.sh
